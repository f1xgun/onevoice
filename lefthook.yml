pre-commit:
  parallel: true
  commands:
    go-lint:
      glob: "*.go"
      run: golangci-lint run --config .golangci.yml --new-from-rev=HEAD {staged_files}
    go-fmt:
      glob: "*.go"
      run: gofmt -l {staged_files}
    frontend-prettier:
      root: "services/frontend/"
      glob: "*.{ts,tsx,js,jsx,json,css,md}"
      run: pnpm exec prettier --check {staged_files}
    frontend-eslint:
      root: "services/frontend/"
      glob: "*.{ts,tsx}"
      run: pnpm exec eslint {staged_files}
    docs-tool-drift:
      # Runs whenever a commit touches Markdown (doc might cite a stale tool name)
      # or Go (a tool might have been renamed/removed). Scope is the whole repo,
      # not just staged files, because the check compares across the two sets.
      glob: "*.{md,go}"
      run: ./scripts/check-doc-tool-drift.sh
