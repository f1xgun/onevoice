name: Claude Assistant

on:
  workflow_dispatch: # Disabled temporarily — requires Anthropic API billing
  # issue_comment:
  #   types: [created]
  # pull_request_review_comment:
  #   types: [created]
  # pull_request_review:
  #   types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  assist:
    name: Claude Auto-Fix
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.head_ref }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@claude"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowedTools "Read,Write,Edit,Glob,Grep,Bash(go test:*),Bash(go build:*),Bash(pnpm:*),Bash(git add:*),Bash(git commit:*)"'
          prompt: |
            You are a development assistant for the OneVoice project. When asked to fix
            issues or implement changes, follow these project conventions:

            ## Project Structure
            - Go workspace with modules: pkg, services/api, services/orchestrator,
              services/agent-telegram, services/agent-vk, services/agent-yandex-business
            - Frontend: Next.js 14 + React 18 at services/frontend
            - Each Go module uses `replace github.com/f1xgun/onevoice/pkg => ../../pkg`
            - Build/test with GOWORK=off per module

            ## Go Patterns
            - 3-layer: handler → service → repository
            - Wrap errors: `fmt.Errorf("context: %w", err)`
            - Tests: `t.Setenv`, interface mocks, `-race` flag
            - Tool names: `{platform}__{action}`

            ## Frontend Patterns
            - React Hook Form + Zod for forms
            - TanStack Query for data fetching
            - Zustand for state management
            - shadcn/ui + Tailwind CSS for UI

            ## Rules
            - Run tests after changes: `go test -v -race ./...` or `pnpm test`
            - Do NOT commit secrets or credentials
            - Keep changes minimal and focused
            - Write tests for new code
