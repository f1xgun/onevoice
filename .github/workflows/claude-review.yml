name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          track_progress: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
          prompt: |
            You are a senior code reviewer for the OneVoice project — a multi-agent platform
            for automating digital presence management. Review this PR thoroughly.

            ## Architecture Rules
            - Backend follows 3-layer pattern: handler → service → repository
            - Dependency injection via interfaces (no global state)
            - Shared code lives in `pkg/` (models, auth, middleware)
            - Each service has its own Go module with `replace` directive to `../../pkg`
            - Go workspace (`go.work`) ties all modules together

            ## Go Conventions
            - Error handling: always wrap errors with context (`fmt.Errorf("doing X: %w", err)`)
            - Tests use `t.Setenv` (not `os.Setenv`) for environment variables
            - Tool naming: `{platform}__{action}` for integration-scoped tools
            - NATS subjects: `tasks.{agentID}` (e.g., `tasks.telegram`)
            - Async billing: fire-and-forget with `go r.logBilling(context.Background(), ...)`
            - RPA agents use `withRetry` + `withPage` + `humanDelay` patterns

            ## Frontend Conventions
            - Forms: React Hook Form + Zod validation
            - Data fetching: TanStack Query (useQuery/useMutation)
            - State: Zustand stores
            - SSE streaming for chat: `data: <json>\n\n` format
            - UI components: shadcn/ui + Tailwind CSS

            ## Security Checks
            - No hardcoded secrets, API keys, or credentials
            - JWT auth on all protected endpoints
            - SQL injection prevention (parameterized queries only)
            - No sensitive data in logs

            ## Testing
            - New code should have corresponding tests
            - Tests must be deterministic (no time-dependent assertions)
            - Use interface mocks, not concrete implementations
            - Race detector enabled (`-race` flag)

            ## Review Format
            Post inline comments on specific lines for issues found.
            Categorize findings as: CRITICAL / IMPORTANT / SUGGESTION.
            If the PR looks good, say so concisely.
