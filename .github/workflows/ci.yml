name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  go-lint:
    name: Go Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            pkg/go.sum
            services/api/go.sum
            services/orchestrator/go.sum
            services/agent-telegram/go.sum
            services/agent-vk/go.sum
            services/agent-yandex-business/go.sum

      - name: Lint pkg
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: pkg
        env:
          GOWORK: "off"

      - name: Lint api
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/api
        env:
          GOWORK: "off"

      - name: Lint orchestrator
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/orchestrator
        env:
          GOWORK: "off"

      - name: Lint agent-telegram
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/agent-telegram
        env:
          GOWORK: "off"

      - name: Lint agent-vk
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/agent-vk
        env:
          GOWORK: "off"

      - name: Lint agent-yandex-business
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/agent-yandex-business
        env:
          GOWORK: "off"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck pkg
        run: govulncheck ./...
        working-directory: pkg
        env:
          GOWORK: "off"

      - name: Govulncheck api
        run: govulncheck ./...
        working-directory: services/api
        env:
          GOWORK: "off"

      - name: Govulncheck orchestrator
        run: govulncheck ./...
        working-directory: services/orchestrator
        env:
          GOWORK: "off"

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            pkg/go.sum
            services/api/go.sum
            services/orchestrator/go.sum
            services/agent-telegram/go.sum
            services/agent-vk/go.sum
            services/agent-yandex-business/go.sum

      - name: Test pkg
        run: go test -v -race -coverprofile=coverage-pkg.out ./...
        working-directory: pkg
        env:
          GOWORK: "off"

      - name: Test api
        run: go test -v -race -coverprofile=coverage-api.out ./...
        working-directory: services/api
        env:
          GOWORK: "off"

      - name: Test orchestrator
        run: go test -v -race -coverprofile=coverage-orchestrator.out ./...
        working-directory: services/orchestrator
        env:
          GOWORK: "off"

      - name: Test agent-telegram
        run: go test -v -race -coverprofile=coverage-agent-telegram.out ./...
        working-directory: services/agent-telegram
        env:
          GOWORK: "off"

      - name: Test agent-vk
        run: go test -v -race -coverprofile=coverage-agent-vk.out ./...
        working-directory: services/agent-vk
        env:
          GOWORK: "off"

      - name: Test agent-yandex-business
        run: go test -v -race -coverprofile=coverage-agent-yandex-business.out ./...
        working-directory: services/agent-yandex-business
        env:
          GOWORK: "off"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            pkg/coverage-pkg.out
            services/api/coverage-api.out
            services/orchestrator/coverage-orchestrator.out
            services/agent-telegram/coverage-agent-telegram.out
            services/agent-vk/coverage-agent-vk.out
            services/agent-yandex-business/coverage-agent-yandex-business.out

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: services/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  docker-build:
    name: Docker Build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: .
            file: Dockerfile
          - image: orchestrator
            context: .
            file: Dockerfile.orchestrator
          - image: agent-telegram
            context: .
            file: Dockerfile.agent-telegram
          - image: agent-vk
            context: .
            file: Dockerfile.agent-vk
          - image: agent-yandex-business
            context: .
            file: Dockerfile.agent-yandex-business
          - image: frontend
            context: services/frontend
            file: services/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  pr-meta:
    name: PR Labels & Size Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml

      - name: PR size check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const totalChanges = additions + deletions;

            if (totalChanges > 500) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['size/large'],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `**Warning:** This PR has ${totalChanges} changed lines (${additions}+ / ${deletions}-). Consider breaking it into smaller PRs for easier review.`,
              });
            }
