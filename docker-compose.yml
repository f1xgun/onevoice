services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: onevoice-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onevoice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onevoice-network

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: onevoice-mongodb
    environment:
      MONGO_INITDB_DATABASE: onevoice
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./migrations/mongo:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onevoice-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: onevoice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onevoice-network

  # NATS (for future use)
  nats:
    image: nats:2.10-alpine
    container_name: onevoice-nats
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onevoice-network

  # Migration runner
  migrate:
    image: migrate/migrate:latest
    container_name: onevoice-migrate
    volumes:
      - ./migrations/postgres:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://postgres:postgres@postgres:5432/onevoice?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - onevoice-network

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onevoice-api
    environment:
      PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onevoice
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: onevoice
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-12345678901234567890123456789012}
      INTERNAL_PORT: 8443
      ORCHESTRATOR_URL: http://orchestrator:8090
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      VK_REDIRECT_URI: ${VK_REDIRECT_URI:-http://localhost/api/v1/oauth/vk/callback}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-http://localhost/api/v1/oauth/yandex_business/callback}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./certs/server.crt:/certs/server.crt:ro
      - ./certs/server.key:/certs/server.key:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - onevoice-network
    restart: unless-stopped

  # Telegram agent
  agent-telegram:
    build:
      context: .
      dockerfile: Dockerfile.agent-telegram
    container_name: onevoice-agent-telegram
    environment:
      NATS_URL: nats://nats:4222
      API_INTERNAL_URL: http://api:8443
    volumes:
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./certs/telegram.crt:/certs/client.crt:ro
      - ./certs/telegram.key:/certs/client.key:ro
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - onevoice-network
    restart: unless-stopped

  # VK agent
  agent-vk:
    build:
      context: .
      dockerfile: Dockerfile.agent-vk
    container_name: onevoice-agent-vk
    environment:
      NATS_URL: nats://nats:4222
      API_INTERNAL_URL: http://api:8443
    volumes:
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./certs/vk.crt:/certs/client.crt:ro
      - ./certs/vk.key:/certs/client.key:ro
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - onevoice-network
    restart: unless-stopped

  # Yandex.Business RPA agent
  agent-yandex-business:
    build:
      context: .
      dockerfile: Dockerfile.agent-yandex-business
    container_name: onevoice-agent-yandex-business
    environment:
      NATS_URL: nats://nats:4222
      API_INTERNAL_URL: http://api:8443
    volumes:
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./certs/yandex-business.crt:/certs/client.crt:ro
      - ./certs/yandex-business.key:/certs/client.key:ro
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - onevoice-network
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: onevoice-frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - api
      - orchestrator
    networks:
      - onevoice-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: onevoice-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - onevoice-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local

networks:
  onevoice-network:
    driver: bridge
