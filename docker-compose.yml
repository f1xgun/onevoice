services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: onevoice-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onevoice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onevoice-network

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: onevoice-mongodb
    environment:
      MONGO_INITDB_DATABASE: onevoice
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./migrations/mongo:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onevoice-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: onevoice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onevoice-network

  # NATS (for future use)
  nats:
    image: nats:2.10-alpine
    container_name: onevoice-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onevoice-network

  # MinIO — S3-compatible object storage for user uploads (logos, etc.)
  minio:
    image: minio/minio:latest
    container_name: onevoice-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onevoice-network

  # Create bucket and set public-read policy for uploaded logos
  minio-init:
    image: minio/mc:latest
    container_name: onevoice-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-onevoice} &&
      mc anonymous set download local/${S3_BUCKET:-onevoice} &&
      echo 'MinIO bucket ready'
      "
    networks:
      - onevoice-network

  # Migration runner
  migrate:
    image: migrate/migrate:latest
    container_name: onevoice-migrate
    volumes:
      - ./migrations/postgres:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://postgres:postgres@postgres:5432/onevoice?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - onevoice-network

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onevoice-api
    environment:
      PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onevoice
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: onevoice
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-12345678901234567890123456789012}
      INTERNAL_PORT: 8443
      ORCHESTRATOR_URL: http://orchestrator:8090
      NATS_URL: nats://nats:4222
      REVIEW_SYNC_INTERVAL_MINUTES: ${REVIEW_SYNC_INTERVAL_MINUTES:-30}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      VK_REDIRECT_URI: ${VK_REDIRECT_URI:-http://localhost/api/v1/oauth/vk/callback}
      VK_SERVICE_KEY: ${VK_SERVICE_KEY:-}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-http://localhost/api/v1/oauth/yandex_business/callback}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-onevoice}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_PUBLIC_URL_PREFIX: ${S3_PUBLIC_URL_PREFIX:-/media}
      # Auto-titler (Phase 18). TITLER_MODEL takes precedence; falls back to
      # LLM_MODEL when unset. At least one provider key must be present, or
      # the titler is left disabled and POST /conversations/{id}/regenerate-title
      # returns 503.
      TITLER_MODEL: ${TITLER_MODEL:-}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./certs/server.crt:/certs/server.crt:ro
      - ./certs/server.key:/certs/server.key:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - onevoice-network
    restart: unless-stopped

  # Telegram agent
  agent-telegram:
    build:
      context: .
      dockerfile: Dockerfile.agent-telegram
    container_name: onevoice-agent-telegram
    environment:
      NATS_URL: nats://nats:4222
      API_INTERNAL_URL: http://api:8443
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./certs/telegram.crt:/certs/client.crt:ro
      - ./certs/telegram.key:/certs/client.key:ro
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - onevoice-network
    restart: unless-stopped

  # VK agent
  agent-vk:
    build:
      context: .
      dockerfile: Dockerfile.agent-vk
    container_name: onevoice-agent-vk
    environment:
      NATS_URL: nats://nats:4222
      API_INTERNAL_URL: http://api:8443
      VK_SERVICE_KEY: ${VK_SERVICE_KEY:-}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./certs/vk.crt:/certs/client.crt:ro
      - ./certs/vk.key:/certs/client.key:ro
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - onevoice-network
    restart: unless-stopped

  # Google Business agent
  agent-google-business:
    build:
      context: .
      dockerfile: Dockerfile.agent-google-business
    container_name: onevoice-agent-google-business
    environment:
      NATS_URL: nats://nats:4222
      API_INTERNAL_URL: http://api:8443
      HEALTH_PORT: "8083"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - onevoice-network
    restart: unless-stopped

  # Yandex.Business RPA agent
  agent-yandex-business:
    build:
      context: .
      dockerfile: Dockerfile.agent-yandex-business
    container_name: onevoice-agent-yandex-business
    environment:
      NATS_URL: nats://nats:4222
      API_INTERNAL_URL: http://api:8443
      RPA_DEBUG_SCREENSHOTS: "1"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./certs/yandex-business.crt:/certs/client.crt:ro
      - ./certs/yandex-business.key:/certs/client.key:ro
      - ./rpa-screenshots:/tmp:rw
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - onevoice-network
    restart: unless-stopped

  # LLM Orchestrator
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: onevoice-orchestrator
    environment:
      PORT: 8090
      NATS_URL: nats://nats:4222
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: onevoice
      REDIS_URL: redis://redis:6379/0
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MAX_ITERATIONS: 10
    ports:
      - "8090:8090"
    depends_on:
      nats:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - onevoice-network
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://api:8080
        ORCHESTRATOR_URL: http://orchestrator:8090
    container_name: onevoice-frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - onevoice-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: onevoice-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - onevoice-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  minio_data:
    driver: local

networks:
  onevoice-network:
    driver: bridge
