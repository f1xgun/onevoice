version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: onevoice_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  mongodb-test:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: onevoice_test
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /data/db

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /data

  api-test:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      POSTGRES_HOST: postgres-test
      POSTGRES_PORT: 5432
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: onevoice_test
      MONGO_URI: mongodb://mongodb-test:27017
      MONGO_DB: onevoice_test
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      JWT_SECRET: "test-jwt-secret-for-integration-tests-minimum-32-characters-long"
      ENCRYPTION_KEY: "12345678901234567890123456789012"
    ports:
      - "8081:8080"
    depends_on:
      postgres-test:
        condition: service_healthy
      mongodb-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
