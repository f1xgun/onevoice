events { worker_connections 1024; }

http {
  # Docker DNS resolver — re-resolves on container restart
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;

    # API routes — direct to API service (bypass Next.js)
    location /api/v1/ {
      set $api_upstream http://api:8080;
      proxy_pass $api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # SSE support for chat endpoint
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
    }

    # Uploaded files — direct to API
    location /uploads/ {
      set $api_upstream http://api:8080;
      proxy_pass $api_upstream;
      proxy_set_header Host $host;
    }

    # Health/metrics — direct to API
    location /health/ {
      set $api_upstream http://api:8080;
      proxy_pass $api_upstream;
    }

    location /metrics {
      set $api_upstream http://api:8080;
      proxy_pass $api_upstream;
    }

    # Everything else — frontend
    location / {
      set $frontend_upstream http://frontend:3000;
      proxy_pass $frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
